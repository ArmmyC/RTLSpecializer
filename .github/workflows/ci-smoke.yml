name: CI Smoke

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show Python version
        run: python --version

      - name: Install pytest
        run: python -m pip install pytest

      - name: Validate golden dataset
        run: python scripts/dataset/validate_dataset.py --input data/golden/golden_v0.1.jsonl --strict

      - name: Run dataset and evaluation tests
        run: python -m pytest tests/dataset tests/eval
